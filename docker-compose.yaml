name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb:latest
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: catalogue:latest
    container_name: catalogue
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    image: frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue

networks:
  default: 
    name: roboshop
    driver: bridge
    external: false